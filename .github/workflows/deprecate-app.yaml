---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Deprecate App

on:
  workflow_dispatch:
    inputs:
      app:
        type: string
        description: App Name
        required: true
      reason:
        type: string
        description: Deprecation Reason
        required: true
      release:
        type: boolean
        description: Create Release
        default: true

permissions:
  contents: read

jobs:
  plan:
    name: Plan (${{ inputs.app }})
    runs-on: ubuntu-24.04
    outputs:
      pull-number: ${{ steps.pr.outputs.pull-request-number }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.BOT_CLIENT_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Validate App Directory
        env:
          APP: ${{ inputs.app }}
        run: |
          if [[ ! -d "./apps/${APP}" ]]; then
            echo "::error::App directory './apps/${APP}' does not exist"
            exit 1
          fi

      - name: Delete App Directory
        env:
          APP: ${{ inputs.app }}
        run: |
          rm -rf ./apps/${APP}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        id: pr
        with:
          body: |
            **Reason**: ${{ inputs.reason }}
          branch: deprecate/${{ inputs.app }}
          commit-message: "release(${{ inputs.app }})!: deprecate app image"
          sign-commits: true
          signoff: true
          title: "release(${{ inputs.app }})!: deprecate app image"
          token: ${{ steps.app-token.outputs.token }}

  merge:
    if: ${{ inputs.release }}
    name: Merge (${{ inputs.app }})
    needs:
      - plan
    runs-on: ubuntu-24.04
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.BOT_CLIENT_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Merge Pull Request
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PULL_NUMBER: ${{ needs.plan.outputs.pull-number }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(process.env.PULL_NUMBER),
              merge_method: 'squash',
            });

  announce:
    if: ${{ inputs.release }}
    name: Announce (${{ inputs.app }})
    needs:
      - merge
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.BOT_CLIENT_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Get Release Tag
        uses: ./.github/actions/release-tag
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Create Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ steps.release.outputs.tag }}
          APP: ${{ inputs.app }}
          REASON: ${{ inputs.reason }}
        run: |-
          cat > release-notes.md <<EOF
          > [!WARNING]
          > An app has been deprecated and will no longer receive updates.
          > After **6 months** from now, its image will be **removed** from our container registry.

          ## 📦 App

          **Name**: ${APP}
          **Reason**: ${REASON}
          EOF
          gh release create "$TAG" --notes-file release-notes.md
