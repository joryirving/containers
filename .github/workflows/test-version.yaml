---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Vulnerability Scan

on:
  schedule:
    - cron: 30 1 * * *
  workflow_dispatch:

permissions:
  contents: read

jobs:
  apps:
    name: Get App Inventory
    runs-on: ubuntu-24.04
    outputs:
      apps: ${{ steps.inventory.outputs.apps }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Get App Inventory
        uses: ./.github/actions/app-inventory
        id: inventory

  grype:
    name: Setup Grype
    runs-on: ubuntu-24.04
    steps:
      - name: Create Cache Key
        id: cache
        run: |
          echo "key=$(date -u +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Restore Database
        id: database-restore
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: grype-db-${{ steps.cache.outputs.key }}
          path: ~/.cache/grype/db

      - if: ${{ always() && steps.database-restore.outputs.cache-hit != 'true' }}
        name: Install Grype
        uses: anchore/scan-action/download-grype@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        id: grype

      - if: ${{ always() && steps.database-restore.outputs.cache-hit != 'true' }}
        name: Update Database
        env:
          GRYPE_CMD: ${{ steps.grype.outputs.cmd }}
        run: |
          "${GRYPE_CMD}" db update

      - if: ${{ always() && steps.database-restore.outputs.cache-hit != 'true' }}
        name: Cache Database
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: grype-db-${{ steps.cache.outputs.key }}
          path: ~/.cache/grype/db

  vulnerability-scan:
    name: Vulnerability Scan (${{ matrix.app }})
    needs:
      - apps
      - grype
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        app: ${{ fromJSON(needs.apps.outputs.apps) }}
      max-parallel: 4
      fail-fast: false
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Retreive Cache Key
        id: cache
        run: |
          echo "key=$(date -u +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Restore Database
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: grype-db-${{ steps.cache.outputs.key }}
          path: ~/.cache/grype/db

      - name: Scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        id: scan
        with:
          fail-build: false
          image: ghcr.io/${{ github.repository_owner }}/${{ matrix.app }}:rolling
          severity-cutoff: high

      - name: Upload Report
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: container:${{ matrix.app }}
          sarif_file: ${{ steps.scan.outputs.sarif }}
