name: AI PR Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Generate bot token
        if: steps.version-check.outputs.skip_review != 'true'
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Analyze PR with reusable AI reviewer
        if: steps.version-check.outputs.skip_review != 'true'
        id: analyze
        uses: misospace/pr-reviewer-action@8d20fd4823b978bbb45fe676f5c0a2510886b02c # v1.0.13
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          ai_primary_retries: '8'
          ai_primary_retry_delay_sec: '15'
          ai_base_url: ${{ secrets.OPENAI_COMPATIBLE_URL }}
          ai_model: ${{ secrets.OPENAI_COMPATIBLE_MODEL }}
          ai_api_key: ${{ secrets.OPENAI_COMPATIBLE_API_KEY }}
          ai_fallback_base_url: ${{ secrets.OPENAI_COMPATIBLE_URL }}
          ai_fallback_model: ${{ secrets.OPENAI_BACKUP_COMPATIBLE_MODEL }}
          ai_fallback_api_key: ${{ secrets.OPENAI_COMPATIBLE_API_KEY }}
          allowed_source_hosts: '*'
          context_limit_mode: normal
          tool_mode: plan_execute_once
          tool_max_requests: '4'
          tool_planning_timeout_sec: '45'
          tool_planning_max_context_bytes: '15000'
          tool_planning_max_tokens: '300'
          tool_max_response_bytes: '12000'
          tool_allowed_gh_api_repos: '*'
          tool_request_timeout_sec: '15'
          tool_failure_enforcement: 'true'
          tool_min_successful_requests: '1'
          tool_enable_for_forks: 'false'
          standards_file_candidates: 'AGENTS.md,.agents/*'
          publish_review_comment: 'true'
          comment_marker: <!-- renovate-review-bot -->
